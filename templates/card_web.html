<style>
.label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.card-text {
    font-size: 18px;
    line-height: 1.5;
    margin-bottom: 8px;
    color: rgba(255, 255, 255, 0.9);
    {FONT_CSS}
}
.highlight {
    border-radius: 4px;
    background-color: rgba(255, 140, 140, 0.5);
    padding: 2px 4px;
}
.translation-placeholder-line {
    height: 12px;
    width: 80%;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 6px;
    margin: 0 0 5px 0;
}
.translation-placeholder-line:last-child {
    width: 55%;
    margin: 0;
}
.original-card-text {
    font-size: 15px;
    line-height: 1.4;
    opacity: 0.7;
    color: rgba(255, 255, 255, 0.85);
}
.tts-btn-group {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    justify-content: flex-end;
}
.tts-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    cursor: pointer;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    user-select: none;
    transition: background 0.15s;
}
.tts-btn:active {
    background: rgba(255, 255, 255, 0.12);
}
.tts-btn.loading {
    opacity: 0.5;
    pointer-events: none;
}
.tts-btn.loading .tts-label {
    display: none;
}
.tts-btn.loading::after {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: cf-spin 0.6s linear infinite;
}
@keyframes cf-spin {
    to { transform: rotate(360deg); }
}
</style>

<div class="label">例句</div>
<div class="card-text">{SENTENCE}</div>

<div class="label" style="margin-top: 10px;">翻译</div>
<div class="card-text" style="line-height: 1.4; opacity: 0.85; font-size: 16px;">{TRANSLATION}</div>

<div class="tts-btn-group">
    {WORD_BUTTON}
    <div class="tts-btn" id="tts-sentence" onclick="this.classList.add('loading');playTTS('{SENTENCE_TEXT}')"><span class="tts-label">朗读例句</span></div>
</div>

{ORIGINAL_CARD_AREA}
