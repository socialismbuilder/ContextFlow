<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ContextFlow 复习</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 顶部状态栏 -->
    <div id="status-bar">
        <div class="status-left">
            <button class="btn-icon" onclick="showDeckSelector()" title="切换牌组"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M4.5 17.27q-.213 0-.356-.145T4 16.768t.144-.356t.356-.143h15q.213 0 .356.144q.144.144.144.357t-.144.356t-.356.143zm0-4.77q-.213 0-.356-.144T4 11.999t.144-.356t.356-.143h15q.213 0 .356.144t.144.357t-.144.356t-.356.143zm0-4.77q-.213 0-.356-.143Q4 7.443 4 7.23t.144-.356t.356-.143h15q.213 0 .356.144T20 7.23t-.144.356t-.356.144z"/></svg></button>
            <button class="btn-icon hidden" id="undo-btn" onclick="undoCard()" title="撤回 (U)"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M7.904 18q-.214 0-.357-.143t-.143-.357t.143-.357t.357-.143h6.754q1.556 0 2.65-1.067q1.096-1.067 1.096-2.606t-1.095-2.596q-1.096-1.058-2.651-1.058H6.916l2.611 2.611q.16.16.16.354t-.16.354t-.363.15q-.204-.01-.345-.15L5.565 9.74q-.13-.131-.183-.268q-.053-.136-.053-.298t.053-.298t.184-.267l3.253-3.254q.16-.16.354-.16t.354.16t.15.363t-.15.345l-2.611 2.61h7.742q1.963 0 3.355 1.354q1.39 1.354 1.39 3.3t-1.39 3.31T14.657 18z"/></svg></button>
            <span id="deck-name">加载中...</span>
        </div>
        <div id="counts">
            <span class="count new" id="count-new">0</span>
            <span class="count learning" id="count-learning">0</span>
            <span class="count review" id="count-review">0</span>
        </div>
    </div>

    <!-- 牌组选择 -->
    <div id="deck-selector" class="hidden">
        <h2>选择牌组</h2>
        <div id="deck-list"></div>
        <button class="btn-back" onclick="hideDeckSelector()">返回</button>
    </div>

    <!-- 卡片区域 -->
    <div id="card-area">
        <!-- ContextFlow 例句区域：正面显示例句+翻译遮挡，背面显示例句+翻译 -->
        <div id="contextflow-side">
            <div id="card-css"></div>
            <div id="contextflow-content" class="card-content"></div>
        </div>

        <!-- 原始卡片背面区域 -->
        <div id="origin-side" class="hidden">
            <div id="origin-content" class="card-content"></div>
        </div>

        <!-- 翻转按钮 + 扩大点击区域 -->
        <div id="flip-area" onclick="showAnswer()">
            <div id="flip-btn">
                <span>显示答案</span>
            </div>
        </div>

        <!-- 答题按钮 -->
        <div id="answer-buttons" class="hidden">
            <button class="answer-btn again" onclick="answerCard(1)">
                <span class="btn-label"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="m5.927 18.192l1.735 1.735q.146.146.153.344q.006.198-.153.363q-.166.166-.357.169t-.357-.162l-2.382-2.383q-.131-.131-.184-.268q-.053-.136-.053-.298t.053-.298t.184-.267l2.382-2.383q.146-.146.347-.153t.367.159q.16.165.162.354t-.162.354l-1.735 1.734h10.765q.27 0 .443-.173t.173-.442v-2.885q0-.213.143-.356t.357-.144t.357.144t.143.356v2.885q0 .671-.472 1.143t-1.144.472zM18.073 6.808H7.308q-.27 0-.442.173q-.174.173-.174.442v2.885q0 .213-.143.357t-.357.143t-.356-.143t-.144-.357V7.423q0-.671.472-1.143t1.144-.472h10.765l-1.734-1.735q-.147-.146-.153-.344t.153-.363q.165-.166.356-.169q.192-.003.357.163l2.383 2.382q.13.131.183.268q.053.136.053.298t-.053.298q-.052.136-.183.267l-2.383 2.383q-.146.146-.347.153t-.366-.159q-.16-.165-.163-.354t.163-.354z"/></svg> 重来</span>
                <span class="btn-time" id="btn-time-1"></span>
            </button>
            <button class="answer-btn hard" onclick="answerCard(2)">
                <span class="btn-label"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M4.126 20q-.234 0-.414-.111t-.28-.293q-.108-.179-.12-.387q-.01-.209.118-.421L11.3 5.212q.128-.212.308-.308T12 4.808t.391.096t.308.308l7.871 13.576q.128.212.115.417t-.118.391t-.282.295t-.41.109zm.324-1h15.1L12 6zm7.984-1.566q.182-.182.182-.434t-.182-.434t-.434-.181t-.434.181t-.182.434t.182.434t.434.181t.434-.181m-.077-2.193q.143-.144.143-.356v-4q0-.213-.144-.357t-.357-.143t-.356.143t-.143.357v4q0 .212.144.356t.357.144t.356-.144M12 12.5"/></svg> 困难</span>
                <span class="btn-time" id="btn-time-2"></span>
            </button>
            <button class="answer-btn good" onclick="answerCard(3)">
                <span class="btn-label"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="m9.55 15.88l8.802-8.801q.146-.146.344-.156t.363.156t.166.357t-.165.356l-8.944 8.95q-.243.243-.566.243t-.566-.243l-4.05-4.05q-.146-.146-.152-.347t.158-.366t.357-.165t.357.165z"/></svg> 良好</span>
                <span class="btn-time" id="btn-time-3"></span>
            </button>
            <button class="answer-btn easy" onclick="answerCard(4)">
                <span class="btn-label"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="m12 14.052l1.65 1.015q.217.137.444-.022q.227-.158.172-.426l-.443-1.886l1.47-1.264q.21-.186.12-.431q-.09-.246-.363-.27l-1.917-.176l-.76-1.761q-.106-.242-.373-.242t-.373.242l-.76 1.761l-1.917.175q-.273.025-.363.27t.12.432l1.47 1.264l-.442 1.886q-.056.268.17.426q.228.159.445.022zM9.073 19H6.616q-.672 0-1.144-.472T5 17.385v-2.458l-1.79-1.796q-.237-.243-.349-.538T2.75 12t.112-.593t.347-.538L5 9.073V6.616q0-.672.472-1.144T6.616 5h2.457l1.796-1.79q.243-.237.538-.349T12 2.75t.593.112t.538.347L14.927 5h2.458q.67 0 1.143.472q.472.472.472 1.144v2.457l1.79 1.796q.237.243.349.538t.111.593t-.111.593t-.348.538L19 14.927v2.458q0 .67-.472 1.143q-.472.472-1.143.472h-2.458l-1.796 1.79q-.243.237-.538.349T12 21.25t-.593-.111t-.538-.348zm.427-1l2.058 2.058q.173.173.442.173t.442-.173L14.5 18h2.885q.269 0 .442-.173t.173-.442V14.5l2.058-2.058q.173-.173.173-.442t-.173-.442L18 9.5V6.616q0-.27-.173-.443T17.385 6H14.5l-2.058-2.058Q12.27 3.77 12 3.77t-.442.173L9.5 6H6.616q-.27 0-.443.173T6 6.616V9.5l-2.058 2.058q-.173.173-.173.442t.173.442L6 14.5v2.885q0 .269.173.442t.443.173zm2.5-6"/></svg> 简单</span>
                <span class="btn-time" id="btn-time-4"></span>
            </button>
        </div>
    </div>

    <!-- 等待界面 -->
    <div id="waiting-screen" class="hidden screen">
        <div class="screen-icon">⏳</div>
        <h2>学习中卡片等待中</h2>
        <p class="wait-info">还有 <span id="learning-remaining">0</span> 张学习中卡片</p>
        <p class="countdown">将在 <span id="wait-seconds" class="countdown-num">0</span> 秒后到达</p>
    </div>

    <!-- 完成界面 -->
    <div id="finished-screen" class="hidden screen">
        <div class="screen-icon">🎉</div>
        <h2>今日复习完成！</h2>
        <button class="btn-primary" onclick="fetchNextCard()">继续检查</button>
        <button class="btn-secondary" onclick="showDeckSelector()">切换牌组</button>
    </div>

    <!-- 加载/错误 -->
    <div id="loading-screen" class="hidden screen">
        <div class="spinner"></div>
        <p id="loading-text">加载中...</p>
    </div>

    <div id="error-screen" class="hidden screen">
        <div class="screen-icon">⚠️</div>
        <h2 id="error-title">出错了</h2>
        <p id="error-message"></p>
        <button class="btn-primary" onclick="fetchNextCard()">重试</button>
    </div>

    <!-- 悬浮操作按钮 -->
    <div id="fab-container">
        <div id="fab" class="fab"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" style="pointer-events:none"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M10.487 10.503q.61-.612.61-1.503q0-.896-.61-1.506t-1.506-.61t-1.506.61T6.865 9q0 .89.61 1.503t1.506.613t1.506-.613m7.563 2.938q-.183-.074-.278-.244t-.022-.347q.356-.927.543-1.897T18.481 9t-.178-1.93q-.178-.949-.534-1.876q-.073-.177.025-.341t.281-.238q.214-.073.409.028t.274.315q.367.975.545 1.983T19.481 9q0 1.056-.19 2.084q-.191 1.028-.558 2.008q-.08.214-.274.317q-.195.104-.409.031m2.939 2.92q-.177-.08-.25-.24t.011-.331q.856-1.552 1.293-3.254q.438-1.702.438-3.485t-.44-3.487T20.725 2.3q-.084-.171-.009-.341t.253-.25q.214-.084.42.007q.207.092.317.286q.875 1.63 1.325 3.406t.45 3.63t-.444 3.63t-1.318 3.405q-.11.194-.323.283t-.407.003M3.558 18.5q-.039-.213-.173-.366t-.347-.153q-.232 0-.385.153q-.153.152-.134.366q.154 1.285 1.137 2.142t2.325.858q1.338 0 2.23-.756q.891-.755 1.397-2.14q.386-1.096.87-1.702t1.845-1.686q1.512-1.212 2.335-2.72T15.48 9q0-2.783-1.859-4.641T8.981 2.5q-2.667 0-4.497 1.695T2.519 8.5q-.019.214.134.357T3.019 9t.347-.143t.153-.357q.135-2.183 1.697-3.591T8.981 3.5q2.317 0 3.909 1.591Q14.48 6.683 14.48 9q0 1.777-.8 3.16q-.8 1.382-2.068 2.351q-1.185.893-1.824 1.687t-1.084 1.96q-.427 1.119-1.04 1.73t-1.683.612q-.883 0-1.576-.568T3.558 18.5"/></svg></div>
        <div id="fab-indicator" class="fab-indicator hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
